<!DOCTYPE html>
<html><head><meta charset="utf-8">
<script src="firebase-sdk/firebase-app-compat.js"></script>
<script src="firebase-sdk/firebase-database-compat.js"></script>
</head><body>
<pre id="r"></pre>
<script>
// Binary search for syntax error in main script
var mainCode = document.querySelector('#main-code').textContent;
var lines = mainCode.split('\n');
document.getElementById('r').textContent = 'Total lines: ' + lines.length + '\n';

function tryParse(codeStr) {
  try { new Function(codeStr); return null; } 
  catch(e) { return e.message; }
}

// Binary search: find first line N where lines[0..N] fails to parse
var lo = 1, hi = lines.length;
while (lo < hi) {
  var mid = Math.floor((lo + hi) / 2);
  var chunk = lines.slice(0, mid).join('\n');
  var err = tryParse(chunk);
  if (err) {
    hi = mid;
  } else {
    lo = mid + 1;
  }
}
var errLine = lo;
document.getElementById('r').textContent += 'First error at line: ' + errLine + '\n';
document.getElementById('r').textContent += 'Error message: ' + tryParse(lines.slice(0, errLine).join('\n')) + '\n\n';

// Show context around error line
for (var i = Math.max(1, errLine-10); i <= Math.min(lines.length, errLine+5); i++) {
  var marker = (i === errLine) ? '>>>' : '   ';
  document.getElementById('r').textContent += marker + ' ' + i + ': ' + lines[i-1] + '\n';
}
</script>
<script id="main-code" type="text/plain">
