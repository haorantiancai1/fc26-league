<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Test 7</title>
</head>
<body>
<div id="r" style="white-space:pre-wrap;font-family:monospace;font-size:11px;max-height:90vh;overflow:auto;"></div>
<script>
window.onerror = function(msg, url, line, col, err) {
    document.getElementById('r').textContent += '\n>>> ERROR at line ' + line + ' col ' + col + ': ' + msg + '\n';
    return false;
};

var xhr = new XMLHttpRequest();
xhr.open('GET', 'index.html', false);
xhr.send();
var html = xhr.responseText;

var matches = html.match(/<script[^>]*>([\s\S]*?)<\/script>/g);
var mainScript = '';
var maxLen = 0;
matches.forEach(function(s) {
    var c = s.replace(/<\/?script[^>]*>/g, '');
    if (c.length > maxLen) { maxLen = c.length; mainScript = c; }
});

// Use a Web Worker to execute the script in isolation
// Workers can report SyntaxError with line numbers
var blob = new Blob([mainScript], { type: 'application/javascript' });
var url = URL.createObjectURL(blob);
var worker = new Worker(url);

worker.onerror = function(e) {
    document.getElementById('r').textContent = 'WORKER SYNTAX ERROR:\n' + e.message + '\nLine: ' + e.lineno + '\nCol: ' + e.colno + '\nFilename: ' + e.filename;
    // Now try to show context around that line
    var lines = mainScript.split('\n');
    var errLine = e.lineno - 1; // 0-indexed
    document.getElementById('r').textContent += '\n\n--- Context ---\n';
    for (var i = Math.max(0, errLine-5); i < Math.min(lines.length, errLine+5); i++) {
        var marker = (i === errLine) ? '>>>' : '   ';
        document.getElementById('r').textContent += marker + ' ' + (i+1) + ': ' + lines[i] + '\n';
    }
    URL.revokeObjectURL(url);
};

worker.onmessage = function(e) {
    document.getElementById('r').textContent = 'Worker executed successfully!';
    URL.revokeObjectURL(url);
};
</script>
</body>
</html>
