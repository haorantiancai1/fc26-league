<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sync Test</title></head>
<body>
<h2>Firebase Sync Test</h2>
<div id="log"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyAvsb1AAF5RffIycA82ai5yWj-Qdzu2Bfo",
  authDomain: "fc26-league-47ef8.firebaseapp.com",
  databaseURL: "https://fc26-league-47ef8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fc26-league-47ef8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var log = document.getElementById('log');

function addLog(msg) {
  log.innerHTML += '<p>' + new Date().toLocaleTimeString() + ' - ' + msg + '</p>';
}

addLog('Firebase initialized, testing playerUpgrades...');

// Test 1: Direct REST fetch
fetch('https://fc26-league-47ef8-default-rtdb.asia-southeast1.firebasedatabase.app/playerUpgrades.json')
  .then(function(r) { return r.text(); })
  .then(function(t) {
    addLog('REST fetch result: ' + t.substring(0, 200));
  })
  .catch(function(e) { addLog('REST fetch error: ' + e); });

// Test 2: Firebase SDK .on('value')
addLog('Registering Firebase .on(value) listener...');
db.ref('playerUpgrades').on('value', function(snap) {
  var data = snap.val();
  addLog('SDK .on(value) fired! data=' + JSON.stringify(data));
  if (data) {
    if (!Array.isArray(data)) data = Object.values(data);
    addLog('Count: ' + data.length);
    if (data.length > 0) {
      var last = data[data.length - 1];
      addLog('Last upgrade: name=' + last.name + ' new_overall=' + last.new_overall);
    }
  }
});

// Test 3: Firebase SDK .once('value')
db.ref('playerUpgrades').once('value', function(snap) {
  var data = snap.val();
  addLog('SDK .once(value) fired! data=' + JSON.stringify(data));
});
</script>
</body></html>
